services:
  # Backend Server
  - type: web
    name: spv-server
    env: node
    region: singapore # Change as needed
    plan: starter # Starter plan is required for persistent disks
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false # Set this in Render Dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    disk:
      name: uploads-disk
      mountPath: /opt/render/project/src/server/uploads
      sizeGB: 1

  # Frontend Client
  - type: web
    name: spv-client
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: ./client/dist
    envVars:
      - key: VITE_API_URL
        value: https://spv-server.onrender.com # Change to your backend URL after first deployment
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
